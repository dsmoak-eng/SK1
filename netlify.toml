[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Increase function timeout for batch fetching (30 companies)
# Default is 10s, we need more for downloading CORPCODE.xml + per-company queries
[functions."dart-proxy"]
  external_node_modules = []

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
